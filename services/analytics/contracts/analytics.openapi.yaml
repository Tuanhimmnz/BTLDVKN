openapi: 3.1.0
info:
  title: Smart Campus — Analytics API
  version: 1.0.0
  description: Dịch vụ tổng hợp và phân tích dữ liệu từ tất cả service.
servers:
  - url: http://localhost:8005
tags:
  - name: metrics
  - name: system
security:
  - bearerAuth: []

paths:
  /health:
    get:
      tags: [system]
      operationId: getHealth
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v1/metrics:
    get:
      tags: [metrics]
      operationId: getAllMetrics
      summary: Dashboard KPI tổng hợp
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsDashboard"

  /api/v1/metrics/{metric_name}:
    get:
      tags: [metrics]
      operationId: getMetric
      parameters:
        - name: metric_name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Metric value
        "404":
          description: Metric not found

  /api/v1/events/recent:
    get:
      tags: [metrics]
      operationId: getRecentEvents
      summary: Recent MQTT events received by Analytics
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 500
      responses:
        "200":
          description: Recent events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecentEventsResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        service:
          type: string
        version:
          type: string
        time:
          type: string
        mqtt_connected:
          type: boolean
        total_events:
          type: integer

    MetricsDashboard:
      type: object
      properties:
        counters:
          type: object
          properties:
            sensor_events:
              type: integer
            access_events:
              type: integer
            camera_events:
              type: integer
            core_alerts:
              type: integer
            access_granted:
              type: integer
            access_denied:
              type: integer
            danger_count:
              type: integer
            warning_count:
              type: integer
            normal_count:
              type: integer
            sensor_error_count:
              type: integer
            invalid_device_count:
              type: integer
            low_battery_count:
              type: integer
            invalid_payload_count:
              type: integer
        avg_temperature_by_room:
          type: object
        avg_humidity_by_room:
          type: object
        access_deny_rate_percent:
          type: number

    RecentEventsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
